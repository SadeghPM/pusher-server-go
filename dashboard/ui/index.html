<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusher Clone Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Token Modal -->
    <div id="token-modal" class="modal">
        <div class="modal-content">
            <h2>Enter Admin Token</h2>
            <input type="password" id="admin-token" placeholder="Admin Token">
            <button id="save-token">Login</button>
        </div>
    </div>

    <!-- Main Layout -->
    <div id="app" style="display: none;">
        <!-- Header -->
        <header class="header">
            <div class="logo">Pusher Clone</div>
            <div class="header-nav">
                <span>App:</span>
                <select id="app-selector"></select>
                <button id="logout">Logout</button>
            </div>
        </header>

        <div class="layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <nav>
                    <ul>
                        <li><a href="#" class="active" id="nav-debug">Debug Console</a></li>
                        <li><a href="#" id="nav-overview">Overview</a></li>
                    </ul>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <h1 id="app-title">Debug console</h1>

                <div id="view-debug">
                <div class="controls">
                    <button id="btn-pause" class="btn">Pause</button>
                    <button id="btn-clear" class="btn">Clear logs</button>
                    <input type="text" id="search-events" placeholder="Search for events">
                </div>

                <!-- Event Creator Toggle -->
                <div class="event-creator-section">
                    <div class="event-creator-header" id="toggle-creator">
                        <div><span class="icon" style="color: #007bff; margin-right: 8px;">⚡</span> Event creator</div>
                        <div id="toggle-icon">▼</div>
                    </div>
                    <div class="event-creator-body" id="creator-body" style="display: none;">
                        <div class="form-group">
                            <label>Channel</label>
                            <input type="text" id="creator-channel" placeholder="my-channel" value="my-channel">
                        </div>
                        <div class="form-group">
                            <label>Event</label>
                            <input type="text" id="creator-event" placeholder="my-event" value="my-event">
                        </div>
                        <div class="form-group">
                            <label>Data (JSON string)</label>
                            <textarea id="creator-data" rows="3">{"message": "hello world"}</textarea>
                        </div>
                        <button id="btn-send-event" class="btn btn-primary">Send event</button>
                    </div>
                </div>

                <!-- Debug Console Table -->
                <div class="table-container">
                    <table class="event-table">
                        <thead>
                            <tr>
                                <th>EVENT</th>
                                <th>DETAILS</th>
                                <th>TIME</th>
                            </tr>
                        </thead>
                        <tbody id="event-log">
                            <tr id="empty-state">
                                <td colspan="3" class="empty-message">Waiting for new events...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                </div>

                <div id="view-overview" style="display: none;">
                    <div class="overview-card">
                        <h3>App Credentials</h3>
                        <div class="overview-item">
                            <label>App ID</label>
                            <input type="text" id="overview-app-id" readonly>
                        </div>
                        <div class="overview-item">
                            <label>Key</label>
                            <input type="text" id="overview-key" readonly>
                        </div>
                        <div class="overview-item">
                            <label>Secret</label>
                            <input type="text" id="overview-secret" readonly>
                        </div>
                    </div>
                    <div class="overview-card" style="margin-top: 20px;">
                        <h3>Configuration</h3>
                        <div class="overview-item">
                            <label>Allowed Origins</label>
                            <textarea id="overview-origins" readonly rows="3"></textarea>
                        </div>
                        <div class="overview-item">
                            <label>Webhooks</label>
                            <textarea id="overview-webhooks" readonly rows="3"></textarea>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
